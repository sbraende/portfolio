<body>
    <!-- LOGO AND NAV SIDEBAR -->
    <header class="header">

            </ul>
        </section>

    <!-- MAIN SECTION -->
    <main class="site-main">
        <!-- HEADER SECTION  -->
        <header class="main-header">
            <div class="main-header__title-and-nav-container">
                <div class="main-header__title-container">
                    <h1 class="main-header__title">Blog</h1>
                </div>
                <div class="main-header__toggle-button-container">
                    <button class="main-header__toggle-button">
                        <img src="../assets/icons/general/menu.svg" alt="menu icon">
                    </button>
                </div>
            </div>
            <!-- SORT AND SEARCH TOOLS -->
            <div class="main_header__tools-container">
                <!-- SORT -->
                <div class="tools tools__sort">
                    <p class="tools__title">Sort:</p>
                    <select name="tools__sort-select" id="sort" class="tools__sort-select">
                        <option value="newest-first">Newest First</option>
                        <option value="oldest-first">Oldest First</option>
                        <option value="shortest-first">Shortest Readingtime</option>
                        <option value="longest-first">Longest Readingtime</option>
                        <option value="most-liked">Most Liked</option>
                    </select>
                </div>
                <!-- SEARCH -->
                <div class="tools tools__search">
                    <p class="tools__title tools__title-search">Search:</p>
                    <input type="text" name="search" id="search" placeholder="Search titles..."
                        class="tools__search-input">
                </div>
            </div>
        </header>
